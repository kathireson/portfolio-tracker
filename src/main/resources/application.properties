spring.application.name=portfolio-tracker
server.port=8443

# Load secrets from external file (gitignored)
# Copy application-secret.properties.example and fill in your values
spring.config.import=optional:file:./application-secret.properties

# H2 file-based database — data persists across restarts
spring.datasource.url=jdbc:h2:file:./data/portfoliodb;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# H2 console available at http://localhost:8080/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Thymeleaf
spring.thymeleaf.cache=false

# Use cookies for session tracking (prevents ;jsessionid in URLs which breaks redirects)
server.servlet.session.tracking-modes=cookie

# -----------------------------------------------
# Market data configuration
# -----------------------------------------------
# Choose your provider: YAHOO or ALPHA_VANTAGE
portfolio.quote-provider=YAHOO

# Alpha Vantage API key (only needed if provider=ALPHA_VANTAGE)
# Get a free key at https://www.alphavantage.co/support/#api-key
# Actual key is in application-secret.properties
portfolio.alpha-vantage.api-key=${ALPHA_VANTAGE_API_KEY:YOUR_KEY_HERE}

# Scheduler: fetch quotes at 9:35 AM ET Mon-Fri
# Cron: sec min hour day month weekday
portfolio.quote-fetch-cron=0 35 9 * * MON-FRI

# Timezone for the scheduler
portfolio.scheduler-timezone=America/New_York

# -----------------------------------------------
# OAuth2 / Keycloak configuration
# -----------------------------------------------
# Set to false to disable OAuth and allow all requests without authentication
portfolio.oauth.enabled=false

# Environment-specific values (issuer-uri, client-secret, redirect-uri)
# are in application-secret.properties
# These properties are only used when portfolio.oauth.enabled=true
spring.security.oauth2.client.provider.kathir-homelab.issuer-uri=${KEYCLOAK_ISSUER_URI:}
spring.security.oauth2.client.registration.keycloak.provider=kathir-homelab
spring.security.oauth2.client.registration.keycloak.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.keycloak.client-id=portfolio-tracker
spring.security.oauth2.client.registration.keycloak.client-secret=${KEYCLOAK_CLIENT_SECRET:}
spring.security.oauth2.client.registration.keycloak.scope=openid
spring.security.oauth2.client.registration.keycloak.redirect-uri=${OAUTH_REDIRECT_URI:http://localhost:8080}

server.ssl.key-store=./ssl/keystore.p12
server.ssl.key-store-type=PKCS12
server.ssl.key-alias=tomcat
server.ssl.key-store-password=${KEYSTORE_PASSWORD:}
